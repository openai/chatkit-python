name: CI

on:
  pull_request:
  workflow_dispatch:
  merge_group:
    types: [checks_requested]

env:
  UV_FROZEN: "1"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true

      - name: Install
        run: make sync

      - name: Lint
        run: make lint

      - name: Type check
        run: make pyright

      - name: Test
        run: make test
